{{ define "title" }}Отчёт{{ end }}

{{ define "content" }}
<div>
    <h1>Форма обратной связи</h1>
    <form action="/submit" method="POST">
        <label for="surname">Фамилия:</label>
        <input type="text" id="surname" name="surname" required><br>

        <label for="name">Имя:</label>
        <input type="text" id="name" name="name" required><br>

        <label for="patronymic">Отчество:</label>
        <input type="text" id="patronymic" name="patronymic"><br>

        <label for="approval">Удовлетворенность сервисом (0-10):</label>
        <input type="text" id="approval" name="approval" required><br>

        <label for="suggestions">Предложения:</label>
        <input type="text" id="suggestions" name="suggestions" required><br>

        <label for="email">Электронная почта:</label>
        <input type="email" id="email" name="email" required><br>

        <input type="submit" value="Отправить">
    </form>
</div>
{{ end }}
